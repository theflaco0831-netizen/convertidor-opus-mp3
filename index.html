<!DOCTYPE html>
<html>
<head>
    <title>Convertidor OPUS a MP3</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 40px; }

        #dropZone {
            width: 400px;
            height: 120px;
            margin: auto;
            border: 3px dashed #aaa;
            border-radius: 15px;
            line-height: 120px;
            font-size: 18px;
            color: #666;
        }

        #dropZone.dragover {
            border-color: green;
            color: green;
            background: #f0fff0;
        }

        .item {
            width: 320px;
            margin: 10px auto;
            position: relative;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        .bar-container { width: 100%; background: #ddd; border-radius: 20px; overflow: hidden; }
        .bar { width: 0%; height: 20px; background: green; transition: width 0.3s; }

        .remove {
            position: absolute;
            right: 6px;
            top: 6px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Convertir OPUS a MP3</h2>

<div id="dropZone">Arrastra archivos OPUS aquí</div>
<br>

<form id="form">
    <input type="file" id="fileInput" accept=".opus" multiple>
    <br><br>
    <button type="submit">Convertir</button>
</form>

<div id="list"></div>

<script>
const form = document.getElementById('form');
const list = document.getElementById('list');
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

let cola = [];

/* ===== DRAG & DROP ===== */
dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');

    for (let file of e.dataTransfer.files) {
        if (file.name.endsWith('.opus')) agregarArchivo(file);
    }
});

/* ===== FILE INPUT ===== */
fileInput.addEventListener('change', () => {
    for (let file of fileInput.files) agregarArchivo(file);
});

/* ===== BOTÓN ===== */
form.addEventListener('submit', e => {
    e.preventDefault();

    for (let file of cola) {
        procesarArchivo(file);
        file.ui.querySelector('.remove').disabled = true;
    }

    cola = [];
});

/* ===== AGREGAR ===== */
function agregarArchivo(file) {
    cola.push(file);

    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `
        <button class="remove">✖</button>
        <b>${file.name}</b>
        <div class="bar-container">
            <div class="bar"></div>
        </div>
        <p class="percent">0%</p>
        <p class="status">Esperando…</p>
    `;

    list.appendChild(item);
    file.ui = item;

    item.querySelector('.remove').onclick = () => {
        cola = cola.filter(f => f !== file);
        item.remove();
    };
}

/* ===== PROCESAR ===== */
function procesarArchivo(file) {

    const bar = file.ui.querySelector('.bar');
    const percent = file.ui.querySelector('.percent');
    const status = file.ui.querySelector('.status');

    status.textContent = 'Convirtiendo…';

    const formData = new FormData();
    formData.append('audio', file);

    fetch('/convert', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        const jobId = data.jobId;

        const interval = setInterval(() => {
            fetch('/progress/' + jobId)
            .then(r => r.json())
            .then(p => {
                bar.style.width = p.progress + '%';
                percent.textContent = p.progress + '%';

                if (p.progress >= 100) {
                    clearInterval(interval);
                    status.textContent = 'Descargando…';

                    fetch('/download/' + jobId)
                    .then(r => r.blob())
                    .then(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = file.name.replace('.opus', '.mp3');
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(url);

                        status.textContent = 'Listo ✔️';
                    });
                }
            });
        }, 500);
    });
}
</script>

</body>
</html>
