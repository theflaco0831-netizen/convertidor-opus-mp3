<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convertidor OPUS a MP3</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height: 100vh;
    margin: 0;
    padding: 30px;
    color: white;
}

h2 {
    margin-bottom: 15px;
}

#app {
    background: #ffffff10;
    padding: 20px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px #00000050;
}

#dropZone {
    border: 2px dashed #aaa;
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.3s;
}

#dropZone.dragover {
    border-color: #00ffcc;
    color: #00ffcc;
    background: #ffffff10;
}

input, button {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}

button {
    background: #00ffcc;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00ccaa;
}

.item {
    background: #ffffff15;
    border-radius: 15px;
    padding: 10px;
    margin-top: 10px;
    position: relative;
    animation: fade 0.4s;
}

@keyframes fade {
    from {opacity:0; transform:scale(.9);}
    to {opacity:1;}
}

.bar-container {
    width: 100%;
    background: #444;
    border-radius: 20px;
    overflow: hidden;
}

.bar {
    height: 18px;
    width: 0%;
    background: linear-gradient(90deg,#00ffcc,#00ffaa);
    transition: width 0.4s;
}

.remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: red;
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
}

.percent, .status {
    margin: 4px 0;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="app">

<h2>🎵 Convertir OPUS a MP3</h2>

<div id="dropZone">📂 Arrastra archivos OPUS aquí</div>

<form id="form">
    <input type="file" id="fileInput" accept=".opus" multiple>
    <button type="submit">Convertir</button>
</form>

<div id="list"></div>

</div>

<script>
const form = document.getElementById('form');
const list = document.getElementById('list');
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

let cola = [];

/* DRAG & DROP */
dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');

    for (let file of e.dataTransfer.files) {
        if (file.name.endsWith('.opus')) agregarArchivo(file);
    }
});

/* FILE INPUT */
fileInput.addEventListener('change', () => {
    for (let file of fileInput.files) agregarArchivo(file);
});

/* BOTÓN */
form.addEventListener('submit', e => {
    e.preventDefault();

    for (let file of cola) {
        procesarArchivo(file);
        file.ui.querySelector('.remove').disabled = true;
    }

    cola = [];
});

/* AGREGAR */
function agregarArchivo(file) {
    cola.push(file);

    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `
        <button class="remove">✖</button>
        <b>${file.name}</b>
        <div class="bar-container">
            <div class="bar"></div>
        </div>
        <p class="percent">0%</p>
        <p class="status">Esperando…</p>
    `;

    list.appendChild(item);
    file.ui = item;

    item.querySelector('.remove').onclick = () => {
        cola = cola.filter(f => f !== file);
        item.remove();
    };
}

/* PROCESAR */
function procesarArchivo(file) {

    const bar = file.ui.querySelector('.bar');
    const percent = file.ui.querySelector('.percent');
    const status = file.ui.querySelector('.status');

    status.textContent = 'Convirtiendo…';

    const formData = new FormData();
    formData.append('audio', file);

    fetch('/convert', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        const jobId = data.jobId;

        const interval = setInterval(() => {
            fetch('/progress/' + jobId)
            .then(r => r.json())
            .then(p => {
                bar.style.width = p.progress + '%';
                percent.textContent = p.progress + '%';

                if (p.progress >= 100) {
                    clearInterval(interval);
                    status.textContent = 'Descargando…';

                    fetch('/download/' + jobId)
                    .then(r => r.blob())
                    .then(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = file.name.replace('.opus', '.mp3');
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(url);

                        status.textContent = 'Listo ✔️';
                    });
                }
            });
        }, 500);
    });
}
</script>

</body>
</html>
